# Learning-grade plaintext secret — committed in cleartext on purpose to keep
# this project simple. Anything committed to git stays in the repo's history
# permanently, so the only real fix for a leaked secret is to rotate it (change
# it in Redis), not to edit this file.
#
# To change it for real use: update the value below AND the consumer in
# k8s/30-redis.yaml, then let ArgoCD sync.
#
# For production, keep the value out of git with one of:
#   - SealedSecrets — commit an encrypted secret; an in-cluster controller
#     decrypts it. Fits this GitOps/ArgoCD setup.
#   - Azure Key Vault + the Secrets Store CSI driver — the value lives in Key
#     Vault and is pulled at runtime; nothing sensitive in git.
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: counter-app
type: Opaque
stringData:
  REDIS_PASSWORD: redis-learning-pw-change-me
